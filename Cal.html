<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.calculator {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    width: 320px;
}

.display {
    width: 100%;
    height: 60px;
    margin-bottom: 20px;
    border-radius: 15px;
    border: none;
    font-size: 24px;
    padding: 10px;
    text-align: right;
    background: rgba(255,255,255,0.2);
    color: white;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

button {
    height: 60px;
    border-radius: 15px;
    border: none;
    font-size: 18px;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.35);
}

button:active {
    transform: scale(0.95);
}

.operator {
    background: rgba(255, 99, 132, 0.6);
}

.equal {
    grid-column: span 2;
    background: rgba(72, 187, 120, 0.7);
}

</style>
</head>
<body>

<div class="calculator">
    <input class="display" type="text" placeholder="0">
    
    <div class="buttons">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">+</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">−</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">×</button>

        <button>0</button>
        <button>.</button>
        <button class="operator">÷</button>
        <button class="equal">=</button>
    </div>
</div>

</body>
</html>
